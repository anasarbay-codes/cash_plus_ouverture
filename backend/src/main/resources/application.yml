spring:
  application:
    name: cash-plus-ouverture

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null


  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cash_plus_ouverture}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${JWT_SECRET:Y2FzaHBsdXMtand0LXNlY3JldC1rZXktMjAyNi1zdXBlci1sb25nLXNlY3VyZQ==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  upload:
    base-dir: ${UPLOAD_BASE_DIR:./uploads}
    demandes-subdir: demandes
    suivis-subdir: suivis

server:
  port: 8080

logging:
  level:
    com.cashplus.ouverture: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
